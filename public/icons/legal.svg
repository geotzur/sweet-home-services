<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Center post -->
  <rect x="22.5" y="8" width="3" height="32" rx="1.5" fill="#1A6B6B"/>
  <!-- Balance beam -->
  <rect x="10" y="16" width="28" height="3" rx="1.5" fill="#1A6B6B"/>
  <!-- Left pan chain -->
  <line x1="14" y1="19" x2="14" y2="27" stroke="#1A6B6B" stroke-width="2" stroke-linecap="round"/>
  <!-- Right pan chain -->
  <line x1="34" y1="19" x2="34" y2="27" stroke="#1A6B6B" stroke-width="2" stroke-linecap="round"/>
  <!-- Left pan -->
  <path d="M9 27 Q14 31 19 27" stroke="#1A6B6B" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Right pan -->
  <path d="M29 27 Q34 31 39 27" stroke="#1A6B6B" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Base -->
  <rect x="17" y="38" width="14" height="3" rx="1.5" fill="#1A6B6B"/>
  <!-- Amber accent top -->
  <circle cx="24" cy="14" r="3" fill="#F5A623"/>
  <!-- Top cap of beam -->
  <circle cx="10" cy="17.5" r="2" fill="#F5A623"/>
  <circle cx="38" cy="17.5" r="2" fill="#F5A623"/>
</svg>
